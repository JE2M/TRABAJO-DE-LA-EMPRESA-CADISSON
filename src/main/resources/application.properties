spring.application.name=cadisson
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/cadisson_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

server.error.whitelabel.enabled=false
server.error.include-exception=false
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

cadisson.admin.correo=${CADISSON_ADMIN_EMAIL:admin@cadisson.com}
cadisson.admin.password=${CADISSON_ADMIN_PASSWORD:}