<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Sistema de Ventas</title>
    <link rel="stylesheet" th:href="@{/css.css}">
</head>
<body>
    <div class="wrapper">
        <div th:replace="layout/fragments :: menu"></div>
        <div class="content">
            <div class="container">
                <h1>Bienvenido al Sistema de Ventas</h1>
                <div class="welcome-box">
                    <h2>¿Por dónde empezamos?</h2>
                    <p>Selecciona una opción del menú lateral para gestionar:</p>
                    <ul>
                        <li><strong>Personas:</strong> Gestiona la información de clientes</li>
                        <li><strong>Productos:</strong> Administra tu catálogo de productos</li>
                        <li><strong>Reportes:</strong> Visualiza tus estadísticas de ventas</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
